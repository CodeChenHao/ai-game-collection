<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>推箱子</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>📦 推箱子</h1>
        
        <div class="game-info">
            <div class="info-item">
                <span class="label">当前关卡</span>
                <span class="value" id="level">1</span>
            </div>
            <div class="info-item">
                <span class="label">步数</span>
                <span class="value" id="steps">0</span>
            </div>
            <div class="info-item">
                <span class="label">最佳</span>
                <span class="value" id="bestSteps">-</span>
            </div>
        </div>

        <div class="game-board" id="gameBoard"></div>

        <div class="level-complete" id="levelComplete">
            <h2>🎉 关卡完成!</h2>
            <p>步数: <span id="levelSteps">0</span></p>
            <button class="btn-next" onclick="nextLevel()">下一关</button>
        </div>

        <div class="game-complete" id="gameComplete">
            <h2>🏆 恭喜通关!</h2>
            <p>你已完成所有关卡!</p>
            <button class="btn-restart" onclick="restartGame()">重新开始</button>
        </div>

        <div class="controls">
            <button class="btn-undo" id="undoBtn" disabled>撤销</button>
            <button class="btn-reset" id="resetBtn">重置本关</button>
            <button class="btn-restart" id="restartBtn">重新开始</button>
            <button class="btn-home" onclick="goHome()">返回首页</button>
        </div>

        <div class="instructions">
            <p>使用方向键或 WASD 移动 | 将所有箱子推到目标位置</p>
            <p>🧑 玩家 | 📦 箱子 | 🎯 目标 | ✅ 完成</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
