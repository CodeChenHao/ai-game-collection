<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>🧱 俄罗斯方块</h1>
        
        <div class="game-wrapper">
            <div class="game-board">
                <canvas id="gameCanvas" width="300" height="600"></canvas>
                <div class="game-over" id="gameOver">
                    <h2>游戏结束!</h2>
                    <p>最终得分: <span id="finalScore">0</span></p>
                </div>
            </div>
            
            <div class="side-panel">
                <div class="next-piece">
                    <h3>下一个</h3>
                    <canvas id="nextCanvas" width="120" height="120"></canvas>
                </div>
                
                <div class="score-board">
                    <div class="score-item">
                        得分
                        <span id="score">0</span>
                    </div>
                    <div class="score-item">
                        最高分
                        <span id="highScore">0</span>
                    </div>
                    <div class="score-item">
                        等级
                        <span id="level">1</span>
                    </div>
                    <div class="score-item">
                        消除行数
                        <span id="lines">0</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn-start" id="startBtn">开始游戏</button>
            <button class="btn-pause" id="pauseBtn" disabled>暂停</button>
            <button class="btn-restart" id="restartBtn" disabled>重新开始</button>
            <button class="btn-home" id="homeBtn" onclick="goHome()">返回首页</button>
        </div>

        <div class="instructions">
            <p>← → 移动 | ↑ 旋转 | ↓ 加速下落 | 空格 直接落下</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
