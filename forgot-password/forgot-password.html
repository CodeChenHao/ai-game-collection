<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密码</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>重置密码</h1>
                <p>输入您的信息以重置密码</p>
            </div>
            
            <form id="forgotPasswordForm" class="login-form">
                <div class="form-group">
                    <label for="email">邮箱</label>
                    <input type="email" id="email" name="email" required autocomplete="email" placeholder="请输入注册邮箱">
                </div>
                
                <div class="form-group captcha-group">
                    <label for="captcha">验证码</label>
                    <div class="captcha-input-wrapper">
                        <input type="text" id="captcha" name="captcha" required placeholder="请输入验证码" maxlength="4">
                        <canvas id="captchaCanvas" width="120" height="40" title="点击刷新验证码"></canvas>
                    </div>
                </div>
                
                <button type="submit" class="login-btn">
                    <span class="btn-text">发送重置链接</span>
                    <span class="btn-loader"></span>
                </button>
            </form>
            
            <div class="login-footer">
                <p>记起密码了？<a href="../login/login.html" class="register-link">立即登录</a></p>
            </div>
        </div>
        
        <div class="background-decoration">
            <div class="circle circle-1"></div>
            <div class="circle circle-2"></div>
            <div class="circle circle-3"></div>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>
    
    <script src="forgot-password.js"></script>
</body>
</html>
